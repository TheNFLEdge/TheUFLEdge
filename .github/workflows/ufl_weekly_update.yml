name: Weekly UFL Edge Issue Generation

on:
  schedule:
    # Runs at 3:33 AM UTC every Tuesday
    - cron: '33 3 * * 2'
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (for uflespnDataGen.js)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Setup Python (for ufl-panageo-projeng.py)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Install Dependencies
      # Note: This assumes you have a package.json and requirements.txt
      - name: Install Dependencies
        run: |
          npm install
          pip install -r requirements.txt

      # 5. Run the Data Generation (Node.js)
      - name: Generate Weekly Data
        run: node ufl-espnDataGen.js

      # 6. Run the Page Projector (Python)
      - name: Project Panageo Issue
        run: python ufl-panageo-projeng.py

      # 7. Commit and Push changes
      # This ensures the files generated by your scripts are saved to the repo
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Weekly UFL Edge Update - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
